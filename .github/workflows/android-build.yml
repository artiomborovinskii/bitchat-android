name: Android Build

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Build with Gradle
        run: ./gradlew build
# Step 6: Upload the APK
      # This is the new, important step!
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          # The name of the file you will download
          name: bitchat-debug-apk
          # The path to the APK file on the runner machine
          path: app/build/outputs/apk/debug/app-debug.apk
