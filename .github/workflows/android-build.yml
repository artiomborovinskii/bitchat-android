name: Android CI Build

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events
  push:
    # UPDATED: Now runs for pushes to 'main' AND 'feature/voip-calling'
    branches:
      - "main"
      - "feature/voip-calling"
  pull_request:
    # UPDATED: Now runs for pull requests targeting 'main' OR 'feature/voip-calling'
    branches:
      - "main"
      - "feature/voip-calling"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checks-out your repository
      # This action automatically checks out the branch that triggered the workflow.
      # So if you push to 'feature/voip-calling', this step will check out that branch's code.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Sets up the Java Development Kit (JDK)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # Step 3: Sets up the Android SDK tools
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Step 4: Grant execute permission to the gradlew script
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # Step 5: Run the Gradle build command
      # This will now compile the code from the 'feature/voip-calling' branch
      - name: Build with Gradle
        run: ./gradlew build
